add_event:
  name: Add event
  description: Add a new calendar event.
  fields:
    title:
      name: Title
      description: Event title
      required: true
      selector:
        text:
    start_time:
      name: Start time
      description: Event start datetime (ISO format)
      required: true
      selector:
        datetime:
    end_time:
      name: End time
      description: Event end datetime (ISO format)
      selector:
        datetime:
    all_day:
      name: All day
      description: Whether the event is all-day
      default: false
      selector:
        boolean:
    calendar_id:
      name: Calendar / family member ID
      description: Assign to family member calendar
      selector:
        text:
    calendar_ids:
      name: Calendar / family member IDs
      description: Assign to multiple family member calendars
      selector:
        object:
    description:
      name: Description
      selector:
        text:
    location:
      name: Location
      selector:
        text:

add_task:
  name: Add task
  description: Add a new chore/task.
  fields:
    title:
      name: Title
      description: Task title
      required: true
      selector:
        text:
    assignee_id:
      name: Assignee ID
      description: Family member ID to assign the task to
      required: true
      selector:
        text:
    category:
      name: Category
      description: Optional category (e.g. chores)
      selector:
        text:
    frequency:
      name: Frequency
      description: daily, weekly, or custom
      default: daily
      selector:
        text:
    icon:
      name: Icon
      description: Optional icon name
      selector:
        text:
    points:
      name: Points
      description: Points for completing the task
      default: 0
      selector:
        number:
          min: 0
          step: 1
    due_date:
      name: Due date
      description: Optional due date (YYYY-MM-DD)
      selector:
        text:

update_task:
  name: Update task
  description: Update an existing task.
  fields:
    task_id:
      name: Task ID
      description: ID of the task to update
      required: true
      selector:
        text:
    title:
      name: Title
      selector:
        text:
    assignee_id:
      name: Assignee ID
      selector:
        text:
    category:
      name: Category
      selector:
        text:
    frequency:
      name: Frequency
      selector:
        text:
    icon:
      name: Icon
      selector:
        text:
    points:
      name: Points
      selector:
        number:
          min: 0
          step: 1
    due_date:
      name: Due date
      selector:
        text:

complete_task:
  name: Complete task
  description: Mark a task as complete.
  fields:
    task_id:
      name: Task ID
      description: ID of the task to complete
      required: true
      selector:
        text:
    completed_date:
      name: Completed date
      description: Date of completion (YYYY-MM-DD). Defaults to today.
      selector:
        text:
    points:
      name: Points
      description: Points to award for completing the task (optional).
      default: 0
      selector:
        number:
          min: 0
          step: 1

add_points:
  name: Add points
  description: Award points to a family member.
  fields:
    member_id:
      name: Member ID
      description: Family member ID
      required: true
      selector:
        text:
    points:
      name: Points
      description: Points to add (can be negative)
      required: true
      selector:
        number:
          step: 1
    reason:
      name: Reason
      description: Reason for the points
      required: true
      selector:
        text:
    task_id:
      name: Task ID
      description: Optional linked task ID
      selector:
        text:

add_reward:
  name: Add reward
  description: Add a new reward definition (name and points required).
  fields:
    name:
      name: Name
      description: Reward name (e.g. Ice cream trip)
      required: true
      selector:
        text:
    points_required:
      name: Points required
      description: Cost in points to redeem
      required: true
      selector:
        number:
          min: 0
          step: 1
    description:
      name: Description
      selector:
        text:
    icon:
      name: Icon
      selector:
        text:

delete_reward:
  name: Delete reward
  description: Delete a reward definition.
  fields:
    reward_id:
      name: Reward ID
      description: ID of the reward to delete
      required: true
      selector:
        text:

redeem_reward:
  name: Redeem reward
  description: Deduct points and redeem a reward for a family member.
  fields:
    member_id:
      name: Member ID
      description: Family member ID
      required: true
      selector:
        text:
    reward_id:
      name: Reward ID
      description: Reward to redeem
      required: true
      selector:
        text:

create_list:
  name: Create list
  description: Create a new list (e.g. grocery, to-do).
  fields:
    name:
      name: List name
      description: Display name of the list
      required: true
      selector:
        text:
    color:
      name: Color
      description: Optional color (hex)
      selector:
        text:
    owner_id:
      name: Owner ID
      description: Optional family member owner ID
      selector:
        text:
    list_type:
      name: List type
      description: Type of list (e.g. general, grocery)
      default: general
      selector:
        text:

add_list_item:
  name: Add list item
  description: Add an item to a list.
  fields:
    list_id:
      name: List ID
      description: ID of the list
      required: true
      selector:
        text:
    content:
      name: Content
      description: Item text
      required: true
      selector:
        text:

delete_list:
  name: Delete list
  description: Delete a list and all of its items.
  fields:
    list_id:
      name: List ID
      description: ID of the list to remove
      required: true
      selector:
        text:

delete_list_item:
  name: Delete list item
  description: Remove a single item from a list.
  fields:
    item_id:
      name: Item ID
      description: ID of the list item row to delete
      required: true
      selector:
        text:

add_meal_recipe:
  name: Add meal recipe
  description: Add a meal recipe with optional ingredients.
  fields:
    name:
      name: Recipe name
      description: Name of the recipe
      required: true
      selector:
        text:
    ingredients:
      name: Ingredients
      description: List of ingredients (each with name, quantity, unit)
      selector:
        object:
    image_url:
      name: Image URL
      description: Optional meal image URL or data URL
      selector:
        text:
    instructions:
      name: Instructions
      description: Optional cooking instructions/notes
      selector:
        text:

add_meal:
  name: Add meal
  description: Add a meal to a specific date and meal slot (breakfast, lunch, dinner, snacks).
  fields:
    name:
      name: Meal name
      description: Name of the meal
      required: true
      selector:
        text:
    meal_date:
      name: Meal date
      description: Date for the meal (YYYY-MM-DD)
      required: true
      selector:
        text:
    meal_type:
      name: Meal type
      description: Type of meal (Breakfast, Lunch, Dinner, Snacks)
      required: true
      selector:
        text:
    recipe_url:
      name: Recipe URL
      description: Optional URL to the recipe
      selector:
        text:
    ingredients:
      name: Ingredients
      description: Optional ingredients (as text)
      selector:
        text:
    image_url:
      name: Image URL
      description: Optional meal image URL or data URL
      selector:
        text:
    instructions:
      name: Instructions
      description: Optional cooking instructions/notes
      selector:
        text:
    meal_recipe_id:
      name: Recipe ID
      description: Optional ID of a saved recipe from the library
      selector:
        text:

delete_task:
  name: Delete task
  description: Delete a chore/task.
  fields:
    task_id:
      name: Task ID
      description: ID of the task to delete
      required: true
      selector:
        text:

update_meal:
  name: Update meal
  description: Update an existing meal.
  fields:
    meal_id:
      name: Meal ID
      description: ID of the meal to update
      required: true
      selector:
        text:
    name:
      name: Meal name
      description: New name for the meal
      selector:
        text:
    meal_recipe_id:
