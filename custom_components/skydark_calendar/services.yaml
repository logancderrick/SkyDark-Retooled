      name: Ingredients
      description: Optional ingredients as JSON string (for meals not linked to a recipe)
      selector:
        text:
    image_url:
      name: Image URL
      description: Optional meal image URL or data URL
      selector:
        text:
    instructions:
      name: Instructions
      description: Optional cooking instructions/notes
      selector:
        text:

delete_meal:
  name: Delete meal
  description: Delete a meal from the calendar.
  fields:
    meal_id:
      name: Meal ID
      description: ID of the meal to delete
      required: true
      selector:
        text:

upload_photo:
  name: Upload photo
  description: Copy a photo into Media > My Media > Calendar Images and register it.
  fields:
    file_path:
      name: File path
      description: Path to the photo file (must be inside Home Assistant config directory)
      required: true
      selector:
        text:
    caption:
      name: Caption
      description: Optional caption
      selector:
        text:
    uploaded_by:
      name: Uploaded by
      description: Optional family member ID
      selector:
        text:

send_notification:
  name: Send notification
  description: Show a notification on the Skydark display.
  fields:
    message:
      name: Message
      description: Notification message
      required: true
      selector:
        text:
    title:
      name: Title
      description: Notification title
      selector:
        text:
