add_event:
  name: Add event
  description: Add a new calendar event.
  fields:
    title:
      name: Title
      description: Event title
      required: true
      selector:
        text:
    start_time:
      name: Start time
      description: Event start datetime (ISO format)
      required: true
      selector:
        datetime:
    end_time:
      name: End time
      description: Event end datetime (ISO format)
      selector:
        datetime:
    all_day:
      name: All day
      description: Whether the event is all-day
      default: false
      selector:
        boolean:
    calendar_id:
      name: Calendar / family member ID
      description: Assign to family member calendar
      selector:
        text:
    description:
      name: Description
      selector:
        text:
    location:
      name: Location
      selector:
        text:

complete_task:
  name: Complete task
  description: Mark a task as complete.
  fields:
    task_id:
      name: Task ID
      description: ID of the task to complete
      required: true
      selector:
        text:
    completed_date:
      name: Completed date
      description: Date of completion (YYYY-MM-DD). Defaults to today.
      selector:
        text:
    points:
      name: Points
      description: Points to award for completing the task (optional).
      default: 0
      selector:
        number:
          min: 0
          step: 1

add_points:
  name: Add points
  description: Award points to a family member.
  fields:
    member_id:
      name: Member ID
      description: Family member ID
      required: true
      selector:
        text:
    points:
      name: Points
      description: Points to add (can be negative)
      required: true
      selector:
        number:
          step: 1
    reason:
      name: Reason
      description: Reason for the points
      required: true
      selector:
        text:
    task_id:
      name: Task ID
      description: Optional linked task ID
      selector:
        text:

redeem_reward:
  name: Redeem reward
  description: Deduct points and redeem a reward for a family member.
  fields:
    member_id:
      name: Member ID
      description: Family member ID
      required: true
      selector:
        text:
    reward_id:
      name: Reward ID
      description: Reward to redeem
      required: true
      selector:
        text:

create_list:
  name: Create list
  description: Create a new list (e.g. grocery, to-do).
  fields:
    name:
      name: List name
      description: Display name of the list
      required: true
      selector:
        text:
    color:
      name: Color
      description: Optional color (hex)
      selector:
        text:
    owner_id:
      name: Owner ID
      description: Optional family member owner ID
      selector:
        text:
    list_type:
      name: List type
      description: Type of list (e.g. general, grocery)
      default: general
      selector:
        text:

add_list_item:
  name: Add list item
  description: Add an item to a list.
  fields:
    list_id:
      name: List ID
      description: ID of the list
      required: true
      selector:
        text:
    content:
      name: Content
      description: Item text
      required: true
      selector:
        text:

add_meal_recipe:
  name: Add meal recipe
  description: Add a meal recipe with optional ingredients.
  fields:
    name:
      name: Recipe name
      description: Name of the recipe
      required: true
      selector:
        text:
    ingredients:
      name: Ingredients
      description: List of ingredients (each with name, quantity, unit)
      selector:
        object:

upload_photo:
  name: Upload photo
  description: Register a photo (file must already exist at file_path within config directory).
  fields:
    file_path:
      name: File path
      description: Path to the photo file (within Home Assistant config directory)
      required: true
      selector:
        text:
    caption:
      name: Caption
      description: Optional caption
      selector:
        text:
    uploaded_by:
      name: Uploaded by
      description: Optional family member ID
      selector:
        text:

send_notification:
  name: Send notification
  description: Show a notification on the Skydark display.
  fields:
    message:
      name: Message
      description: Notification message
      required: true
      selector:
        text:
    title:
      name: Title
      description: Notification title
      selector:
        text:
